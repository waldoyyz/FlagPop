<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Pop Flag Pop! 🌟</title>
    <style>
        /* Variáveis de Cores - Estética K-Pop Kawaii */
        :root {
            --bg-color: #ffe4e1;
            --container-bg: #ffffff;
            --primary: #ff6b81;
            --secondary: #7bed9f;
            --accent: #70a1ff;
            --text-main: #2f3542;
            --correct: #2ed573;
            --wrong: #ff4757;
            --shadow: rgba(47, 53, 66, 0.15);
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20px 20px, rgba(255,107,129,0.1) 10px, transparent 11px),
                radial-gradient(circle at 60px 60px, rgba(123,237,159,0.1) 10px, transparent 11px);
            background-size: 80px 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        #game-container {
            background: var(--container-bg);
            border: 4px solid var(--primary);
            border-radius: 30px;
            box-shadow: 0 12px 0px var(--primary), 0 20px 25px var(--shadow);
            width: 100%;
            max-width: 480px;
            padding: 25px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .screen { display: none; flex-direction: column; align-items: center; gap: 20px; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1, h2 { color: var(--primary); font-size: 1.8rem; text-shadow: 2px 2px 0px #ffeaa7; }
        p { color: var(--text-main); font-size: 1.1rem; font-weight: bold; }

        .mascot { font-size: 5rem; filter: drop-shadow(0 5px 0px var(--accent)); animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .btn {
            background: var(--container-bg);
            border: 3px solid var(--text-main);
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 800;
            padding: 12px 10px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--text-main);
            transition: all 0.1s ease;
            width: 100%;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 0px 0 var(--text-main); }
        .btn-primary { background: var(--primary); color: white; border-color: var(--text-main); border-radius: 50px; padding: 15px 30px;}
        .btn-secondary { background: var(--secondary); color: white; border-radius: 50px; padding: 15px 30px;}

        .game-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge { background: var(--accent); color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 1rem; border: 2px solid var(--text-main); box-shadow: 0 3px 0 var(--text-main); }
        .lives { font-size: 1.5rem; letter-spacing: 2px; }

        .flag-box {
            background: #f1f2f6;
            border: 3px solid var(--text-main);
            border-radius: 20px;
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
            position: relative;
        }
        .flag-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .flag-img.pop { transform: scale(1.05); }

        /* Novo Grid para 4 Opções */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 10px; }
        .btn-option { background: white; text-align: center; }

        .correct { background: var(--correct) !important; color: white !important; animation: popBounce 0.5s ease; border-color: #27ae60; box-shadow: 0 5px 0 #27ae60; }
        .wrong { background: var(--wrong) !important; color: white !important; animation: shake 0.4s ease; border-color: #c0392b; box-shadow: 0 5px 0 #c0392b; opacity: 0.8; }

        @keyframes popBounce { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }

        /* Animação do Emoji de Celebração a cada 5 acertos */
        .celebration-emoji {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 8rem;
            z-index: 1000;
            pointer-events: none;
            animation: popCelebration 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popCelebration {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; display: none; }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div id="game-container">
        <!-- Tela Inicial -->
        <div id="start-screen" class="screen active">
            <div class="mascot">👩🏻‍🎤✨</div>
            <h1>K-Pop Flag Pop!</h1>
            <p>Adivinhe as bandeiras e vire uma Idol!</p>
            <button class="btn btn-primary" onclick="startGame()">JOGAR! 🚀</button>
        </div>

        <!-- Tela do Jogo -->
        <div id="quiz-screen" class="screen">
            <div class="game-header">
                <div class="badge" id="level-display">Lvl 1/100</div>
                <div class="lives" id="lives-display">❤️❤️❤️</div>
            </div>
            <h2 style="font-size: 1.4rem;">De onde é essa bandeira?</h2>
            <div class="flag-box">
                <img src="" id="flag-img" class="flag-img" alt="Bandeira do País">
            </div>
            <!-- Agora com 4 opções -->
            <div class="options-grid" id="options-container"></div>
        </div>

        <!-- Tela de Game Over -->
        <div id="game-over-screen" class="screen">
            <div class="mascot" style="animation: none; transform: rotate(10deg);">😭💔</div>
            <h2 style="color: var(--wrong);">Poxa, acabaram as vidas!</h2>
            <p>Mas idols nunca desistem! Tente novamente.</p>
            <button class="btn btn-primary" onclick="restartGame()">REINICIAR 🔄</button>
        </div>

        <!-- Tela de Vitória -->
        <div id="win-screen" class="screen">
            <div class="mascot">👑🇰🇷</div>
            <h2 style="color: var(--correct);">DAEBAK! (대박!)</h2>
            <p>Você completou tudo! É uma lenda K-Pop!</p>
            <button class="btn btn-secondary" onclick="restartGame()">Jogar de Novo! 🌟</button>
        </div>
    </div>

    <script>
        // Dados otimizados com siglas dos continentes (SA, NA, EU, AS, AF, OC)
        const rawData = [
            "br|Brasil|SA", "us|Estados Unidos|NA", "ca|Canadá|NA", "kr|Coreia do Sul|AS", "jp|Japão|AS", "ar|Argentina|SA", "ch|Suíça|EU", "it|Itália|EU", "fr|França|EU", "gb|Reino Unido|EU",
            "de|Alemanha|EU", "es|Espanha|EU", "mx|México|NA", "pt|Portugal|EU", "au|Austrália|OC", "cn|China|AS", "eg|Egito|AF", "in|Índia|AS", "za|África do Sul|AF", "cl|Chile|SA",
            "ru|Rússia|EU", "tr|Turquia|EU", "se|Suécia|EU", "no|Noruega|EU", "dk|Dinamarca|EU", "fi|Finlândia|EU", "nl|Holanda|EU", "be|Bélgica|EU", "at|Áustria|EU", "gr|Grécia|EU",
            "pe|Peru|SA", "co|Colômbia|SA", "ve|Venezuela|SA", "uy|Uruguai|SA", "py|Paraguai|SA", "bo|Bolívia|SA", "ec|Equador|SA", "cr|Costa Rica|NA", "cu|Cuba|NA", "pa|Panamá|NA",
            "nz|Nova Zelândia|OC", "ph|Filipinas|AS", "id|Indonésia|AS", "my|Malásia|AS", "th|Tailândia|AS", "vn|Vietnã|AS", "sg|Singapura|AS", "pk|Paquistão|AS", "bd|Bangladesh|AS", "lk|Sri Lanka|AS",
            "ng|Nigéria|AF", "ke|Quênia|AF", "ma|Marrocos|AF", "dz|Argélia|AF", "gh|Gana|AF", "sn|Senegal|AF", "et|Etiópia|AF", "tz|Tanzânia|AF", "ug|Uganda|AF", "ci|Costa do Marfim|AF",
            "ie|Irlanda|EU", "pl|Polônia|EU", "cz|Rep. Tcheca|EU", "hu|Hungria|EU", "ro|Romênia|EU", "bg|Bulgária|EU", "hr|Croácia|EU", "rs|Sérvia|EU", "sk|Eslováquia|EU", "si|Eslovênia|EU",
            "sa|Arábia Saudita|AS", "ae|Emirados Árabes|AS", "il|Israel|AS", "ir|Irã|AS", "iq|Iraque|AS", "sy|Síria|AS", "jo|Jordânia|AS", "lb|Líbano|AS", "qa|Catar|AS", "kw|Kuwait|AS",
            "jm|Jamaica|NA", "ht|Haiti|NA", "do|Rep. Dominicana|NA", "bs|Bahamas|NA", "tt|Trindade e Tobago|NA", "bb|Barbados|NA", "bz|Belize|NA", "sv|El Salvador|NA", "hn|Honduras|NA", "gt|Guatemala|NA",
            "is|Islândia|EU", "lu|Luxemburgo|EU", "mc|Mônaco|EU", "ad|Andorra|EU", "sm|San Marino|EU", "li|Liechtenstein|EU", "mt|Malta|EU", "cy|Chipre|EU", "fj|Fiji|OC", "mv|Maldivas|AS"
        ];
        
        // Mapeando a base de dados
        const countries = rawData.map(d => {
            const parts = d.split('|');
            return { code: parts[0], name: parts[1], continent: parts[2] };
        });

        const celebrationEmojis = ['🌟', '🎉', '✨', '💖', '🎊', '🎈', '🌸', '🎀', '🎵', '🦄', '🍭', '🍬', '🍰', '🌈', '🏆', '👑', '🥳', '🤩', '🫰', '🔥'];

        let currentLevel = 0;
        let lives = 3;
        let isAnimating = false;

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById("confetti-canvas").style.display = "none";
            currentLevel = 0;
            lives = 3;
            updateLivesDisplay();
            switchScreen('quiz-screen');
            loadLevel();
        }

        function restartGame() {
            startGame();
        }

        function updateLivesDisplay() {
            let hearts = '';
            for(let i=0; i<3; i++) hearts += i < lives ? '❤️' : '💔';
            document.getElementById('lives-display').innerText = hearts;
        }

        function showCelebration() {
            const emoji = celebrationEmojis[Math.floor(Math.random() * celebrationEmojis.length)];
            const el = document.createElement('div');
            el.className = 'celebration-emoji';
            el.innerText = emoji;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        function loadLevel() {
            isAnimating = false;
            document.getElementById("level-display").innerText = `Lvl ${currentLevel + 1}/100`;

            const correctCountry = countries[currentLevel];
            const flagImg = document.getElementById("flag-img");
            flagImg.src = `https://flagcdn.com/w320/${correctCountry.code}.png`;
            
            flagImg.classList.remove('pop');
            void flagImg.offsetWidth; 
            flagImg.classList.add('pop');

            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            // Pool de países NUNCA exibidos como resposta certa
            let unseenPool = countries.slice(currentLevel + 1);
            let wrongOptions = [];

            // 1. Tentar pegar 1 país do mesmo continente
            let sameContinent = unseenPool.filter(c => c.continent === correctCountry.continent);
            if (sameContinent.length > 0) {
                let picked = sameContinent[Math.floor(Math.random() * sameContinent.length)];
                wrongOptions.push(picked);
            }

            // 2. Preencher até ter 3 opções erradas respeitando a dificuldade
            let difficultyLimit = Math.min(99, Math.floor(currentLevel / 10) * 10 + 19);
            let preferredPool = unseenPool.filter(c => countries.indexOf(c) <= difficultyLimit && !wrongOptions.includes(c));

            while(wrongOptions.length < 3) {
                let pool = preferredPool.length > 0 ? preferredPool : unseenPool.filter(c => !wrongOptions.includes(c));
                if(pool.length === 0) break; // Acabou o pool de não vistos (ocorre no fim do jogo)
                
                let picked = pool[Math.floor(Math.random() * pool.length)];
                wrongOptions.push(picked);
                preferredPool = preferredPool.filter(c => c !== picked);
            }

            // Fallback de segurança para os últimos 3 níveis do jogo
            if(wrongOptions.length < 3) {
                let usedPool = countries.slice(0, currentLevel).filter(c => !wrongOptions.includes(c));
                while(wrongOptions.length < 3 && usedPool.length > 0) {
                    let picked = usedPool[Math.floor(Math.random() * usedPool.length)];
                    wrongOptions.push(picked);
                    usedPool = usedPool.filter(c => c !== picked);
                }
            }

            // Mistura 1 certa + 3 erradas
            const allOptions = [correctCountry, ...wrongOptions].sort(() => Math.random() - 0.5);

            allOptions.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "btn btn-option";
                btn.innerText = opt.name;
                btn.onclick = () => handleAnswer(btn, opt.code === correctCountry.code, correctCountry.name);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(btn, isCorrect, correctName) {
            if (isAnimating) return;
            isAnimating = true;

            if (isCorrect) {
                btn.classList.add("correct");
                playAudioTone(523.25, 659.25); 
                speakCountryName(correctName);

                let nextLevel = currentLevel + 1;
                
                // Se for multiplo de 5, comemora!
                if (nextLevel % 5 === 0 && nextLevel < 100) {
                    showCelebration();
                }

                setTimeout(() => {
                    currentLevel++;
                    if (currentLevel >= countries.length) {
                        switchScreen('win-screen');
                        fireConfetti();
                    } else {
                        loadLevel();
                    }
                }, 1200);
            } else {
                btn.classList.add("wrong");
                playAudioTone(300, 200, "sawtooth"); 
                lives--;
                updateLivesDisplay();

                setTimeout(() => {
                    if (lives <= 0) {
                        switchScreen('game-over-screen');
                    } else {
                        isAnimating = false; 
                    }
                }, 800);
            }
        }

        function speakCountryName(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'pt-BR';
                msg.rate = 1.1; 
                msg.pitch = 1.2; 
                window.speechSynthesis.speak(msg);
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAudioTone(freq1, freq2, type = 'sine') {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            
            if (freq2) {
                setTimeout(() => {
                    osc.frequency.setValueAtTime(freq2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.stop(audioCtx.currentTime + 0.15);
                }, 100);
            } else {
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        /* --- CONFETE COMPACTO --- */
        function fireConfetti() {
            const cvs = document.getElementById("confetti-canvas");
            cvs.style.display = "block";
            const ctx = cvs.getContext("2d");
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            let pts = Array.from({length: 80}).map(() => ({
                x: Math.random()*cvs.width, y: Math.random()*cvs.height - cvs.height,
                s: Math.random()*8+4, dy: Math.random()*3+2, dx: Math.random()*2-1,
                c: ['#ff6b81','#7bed9f','#70a1ff','#ffeaa7','#ffffff'][Math.floor(Math.random()*5)]
            }));
            function draw() {
                ctx.clearRect(0, 0, cvs.width, cvs.height);
                let active = false;
                pts.forEach(p => {
                    p.y += p.dy; p.x += p.dx;
                    if(p.y < cvs.height) active = true;
                    ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.s, p.s);
                });
                if(active) requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
